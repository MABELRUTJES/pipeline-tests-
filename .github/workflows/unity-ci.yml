name: Unity CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: unity-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: .
  BUILD_NAME: PipelineTestGame
  TEST_RESULTS_PATH: test-results
  BUILD_PATH: build

jobs:
  code-style:
    name: Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for tabs in C# files
        run: |
          if grep -RIn $'\t' Assets --include="*.cs"; then
            echo "Tabs found in C# files. Use spaces according to .editorconfig."
            exit 1
          fi

      - name: Check for trailing spaces in C# files
        run: |
          if grep -RIn ' $' Assets --include="*.cs"; then
            echo "Trailing spaces found in C# files."
            exit 1
          fi

  unity-tests:
    name: Unity Tests
    runs-on: ubuntu-latest
    needs: code-style

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Unity Library for tests
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-test-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-test-${{ runner.os }}-
            Library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          testMode: editmode
          artifactsPath: ${{ env.TEST_RESULTS_PATH }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: ${{ env.TEST_RESULTS_PATH }}

  unity-build:
    name: Unity Build (${{ matrix.targetPlatform }})
    runs-on: ubuntu-latest
    needs: unity-tests
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneOSX

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Unity Library for build
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-build-${{ runner.os }}-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-build-${{ runner.os }}-${{ matrix.targetPlatform }}-
            Library-build-${{ runner.os }}-
            Library-

      - name: Build Unity project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: ${{ matrix.targetPlatform }}
          buildsPath: ${{ env.BUILD_PATH }}
          buildName: ${{ env.BUILD_NAME }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}-${{ matrix.targetPlatform }}
          path: ${{ env.BUILD_PATH }}
