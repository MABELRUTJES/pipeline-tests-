name: Unity CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: unity-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: .
  BUILD_TARGET: StandaloneWindows64
  BUILD_NAME: PipelineTestGame
  TEST_RESULTS_PATH: test-results
  BUILD_PATH: build

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Check whitespace Assembly-CSharp
        run: dotnet format whitespace Assembly-CSharp.csproj --verify-no-changes

      - name: Check style Assembly-CSharp
        run: dotnet format style Assembly-CSharp.csproj --verify-no-changes

      - name: Check whitespace Assembly-CSharp-Editor
        run: dotnet format whitespace Assembly-CSharp-Editor.csproj --verify-no-changes

      - name: Check style Assembly-CSharp-Editor
        run: dotnet format style Assembly-CSharp-Editor.csproj --verify-no-changes

  unity-tests:
    name: Unity Tests
    runs-on: ubuntu-latest
    needs: formatting

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-test-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-test-${{ runner.os }}-
            Library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          testMode: editmode
          artifactsPath: ${{ env.TEST_RESULTS_PATH }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: ${{ env.TEST_RESULTS_PATH }}

  unity-build:
    name: Unity Build
    runs-on: ubuntu-latest
    needs: unity-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-build-${{ runner.os }}-${{ env.BUILD_TARGET }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-build-${{ runner.os }}-${{ env.BUILD_TARGET }}-
            Library-build-${{ runner.os }}-
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: ${{ env.BUILD_TARGET }}
          buildsPath: ${{ env.BUILD_PATH }}
          buildName: ${{ env.BUILD_NAME }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}-${{ env.BUILD_TARGET }}
          path: ${{ env.BUILD_PATH }}
